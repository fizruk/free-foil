name: Release
on:
  release:
    types: [published]

  # A dry run: builds the source and documentation tarballs exactly as a real
  # release would, and stops before uploading anything. Without this, the steps
  # below are exercised for the first time on release day.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  hackage:
    name: "Upload a new candidate on Hackage"
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🧰 Setup Stack
        uses: freckle/stack-action@v5
        with:
          fast: false

      - name: 🔨 Generate package dist tarball (free-foil)
        run: stack sdist haskell/free-foil --tar-dir packages/

      # Hackage does not build our documentation for us (it has produced no build
      # report at all since 0.0.3), so we build the haddocks ourselves. They are
      # NOT uploaded here: uploading to a candidate is pointless, since promoting
      # a candidate does not carry its documentation across. Instead the tarball
      # is kept as a workflow artifact, and 'upload-docs.yml' uploads it to the
      # published package after the candidate is promoted. Building it here also
      # exercises 'cabal haddock' on every dry run, rather than first on release day.
      # This needs cabal and a GHC new enough for our template-haskell bound;
      # the resolver's GHC is the one we know the package builds with.
      - name: 🧰 Setup GHC and cabal (for haddocks)
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.8.2"
          cabal-version: "latest"

      - name: 💾 Cache cabal store (for haddocks)
        uses: actions/cache@v4
        with:
          path: ~/.cabal/store
          key: cabal-store-${{ runner.os }}-ghc9.8.2-${{ hashFiles('haskell/free-foil/free-foil.cabal') }}
          restore-keys: cabal-store-${{ runner.os }}-ghc9.8.2-

      - name: 📚 Generate documentation tarball (free-foil)
        run: |
          cabal update
          cabal haddock --haddock-for-hackage --builddir=dist-docs
          mkdir -p docs
          mv dist-docs/*-docs.tar.gz docs/
        working-directory: haskell/free-foil

      - name: 📦 Upload tarballs as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hackage-tarballs
          path: |
            packages/*.tar.gz
            haskell/free-foil/docs/*-docs.tar.gz

      # Only a published release uploads to Hackage; a manual run is a dry run.
      # The package goes up as a candidate (publish: false); docs are not sent
      # here (see above) — 'upload-docs.yml' handles them after promotion.
      - name: 🚀 Upload on Hackage
        if: github.event_name == 'release'
        uses: haskell-actions/hackage-publish@v1
        with:
          hackageToken: ${{ secrets.HACKAGE_AUTH_TOKEN }}
          packagesPath: packages
          publish: false
