name: Haskell (build, test, haddock)

# Controls when the workflow will run
on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write # to submit Haddock documentation to GitHub Pages

jobs:
  tests:
    name: Run tests
    runs-on: ${{ matrix.os }}
    strategy:
      # Pull requests are tested on Linux only; `main` and tags are tested on
      # all three platforms. A release is cut from `main`, so the cross-platform
      # signal is still there when it matters, while an ordinary PR no longer
      # pays for the (slowest) Windows job or writes ~1 GB of platform caches
      # that then evict `main`'s caches from the repository's 10 GB budget.
      matrix:
        os: ${{ fromJSON(github.event_name == 'pull_request' && '["ubuntu-latest"]' || '["ubuntu-latest", "windows-latest", "macos-latest"]') }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: Set codepage on Windows
        if: ${{ runner.os == 'Windows' }}
        run: chcp 65001

      - name: Restore Syntax files
        id: restore-syntax-files
        uses: actions/cache/restore@v4
        with:
          key: syntax-files-${{ runner.os }}-${{ hashFiles(format('{0}.cf', 'haskell/lambda-pi/src/Language/LambdaPi/Syntax/'), 'stack.yaml.lock') }}
          path: |
            haskell/lambda-pi/src/Language/LambdaPi/Syntax/Lex.hs
            haskell/lambda-pi/src/Language/LambdaPi/Syntax/Par.hs

      # Install GHC and Stack through the toolchain cache, which is keyed on the
      # GHC version alone. A stack-managed GHC would instead ride in the same
      # cache as the built dependencies, and so be re-downloaded whenever a
      # package.yaml or dependency changes. The version must match the resolver's
      # GHC (nightly-2024-08-17 → 9.8.2); a mismatch makes '--system-ghc' fail loudly.
      - name: 🧰 Setup GHC and Stack (cached toolchain)
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.8.2"
          enable-stack: true
          stack-version: "latest"

      - name: 🧰 Setup Stack
        uses: freckle/stack-action@v5
        with:
          # Use the GHC and Stack installed above, rather than a stack-managed GHC.
          install-stack: false
          upgrade-stack: false
          stack-arguments: --system-ghc --no-install-ghc
          # Benchmarks are built (so that they cannot rot), but not run: timings
          # from a shared runner would mean nothing.
          stack-build-arguments: --pedantic --bench --no-run-benchmarks
          stack-build-arguments-build: --dry-run
          stack-build-arguments-test: --ghc-options -O2 ${{ steps.restore-syntax-files.outputs.cache-hit == 'true' && ' ' || '--reconfigure --force-dirty --ghc-options -fforce-recomp' }}

      - name: Save Syntax files
        uses: actions/cache/save@v4
        if: steps.restore-syntax-files.outputs.cache-hit != 'true'
        with:
          key: syntax-files-${{ runner.os }}-${{ hashFiles(format('{0}.cf', 'haskell/lambda-pi/src/Language/LambdaPi/Syntax/'), 'stack.yaml.lock') }}
          path: |
            haskell/lambda-pi/src/Language/LambdaPi/Syntax/Lex.hs
            haskell/lambda-pi/src/Language/LambdaPi/Syntax/Par.hs

  docs:
    needs: [tests]
    if: ${{ github.ref_name == 'main' }}
    name: "Build and upload site (main)"
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: 🧰 Setup GHC and Stack (cached toolchain)
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.8.2"
          enable-stack: true
          stack-version: "latest"

      - name: 🧰 Setup Stack
        uses: freckle/stack-action@v5
        with:
          install-stack: false
          upgrade-stack: false
          stack-arguments: --system-ghc --no-install-ghc
          test: false
          stack-build-arguments: --fast --haddock
          cache-prefix: docs-

      - name: Add haddock
        run: |
          mkdir -p dist/haddock
          mv $(stack path --local-doc-root)/* dist/haddock

      - name: 🚀 Publish Site
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          folder: dist
          single-commit: true
